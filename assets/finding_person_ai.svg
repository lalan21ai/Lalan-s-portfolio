<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">AI face recognition search visual</title>
  <desc id="desc">A futuristic AI interface scanning a person silhouette against CCTV frames and location signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#100d0b"/>
      <stop offset="0.52" stop-color="#1c1512"/>
      <stop offset="1" stop-color="#090706"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7c948"/>
      <stop offset="0.52" stop-color="#f39c12"/>
      <stop offset="1" stop-color="#e67e22"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="48%">
      <stop offset="0" stop-color="#f39c12" stop-opacity="0.36"/>
      <stop offset="0.56" stop-color="#f39c12" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#f39c12" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#f39c12" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#grid)"/>
  <circle cx="600" cy="350" r="290" fill="url(#glow)"/>

  <g opacity="0.7">
    <path d="M120 162 C258 88, 375 205, 504 150 S737 57, 885 150 S1048 204, 1110 119" fill="none" stroke="#f39c12" stroke-opacity="0.28" stroke-width="2"/>
    <path d="M88 558 C265 452, 379 585, 520 500 S747 414, 888 506 S1057 553, 1144 478" fill="none" stroke="#e67e22" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M145 350 H306 M894 350 H1055 M600 96 V205 M600 495 V610" stroke="#f39c12" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <g transform="translate(425 145)">
    <rect x="0" y="0" width="350" height="420" rx="34" fill="#17110f" fill-opacity="0.8" stroke="#f39c12" stroke-opacity="0.45" stroke-width="2"/>
    <rect x="26" y="26" width="298" height="368" rx="26" fill="#0d0a09" stroke="#f39c12" stroke-opacity="0.18"/>
    <circle cx="175" cy="142" r="72" fill="#2a1d16" stroke="url(#gold)" stroke-width="5"/>
    <path d="M117 309 C126 250 224 250 233 309 C237 336 212 356 175 356 C138 356 113 336 117 309Z" fill="#2a1d16" stroke="url(#gold)" stroke-width="5"/>
    <path d="M67 73 H127 M223 73 H283 M67 347 H127 M223 347 H283" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>
    <path d="M72 68 V128 M278 68 V128 M72 292 V352 M278 292 V352" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>
    <rect x="57" y="202" width="236" height="14" rx="7" fill="url(#gold)" opacity="0.9" filter="url(#softGlow)"/>
    <text x="175" y="386" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#f39c12">FACE MATCH</text>
  </g>

  <g transform="translate(80 112)">
    <rect width="260" height="150" rx="18" fill="#17110f" fill-opacity="0.78" stroke="#f39c12" stroke-opacity="0.26"/>
    <rect x="20" y="24" width="100" height="74" rx="10" fill="#241913" stroke="#f39c12" stroke-opacity="0.22"/>
    <circle cx="70" cy="54" r="21" fill="#f39c12" opacity="0.45"/>
    <path d="M39 98 C43 73 97 73 101 98" fill="none" stroke="#f39c12" stroke-opacity="0.55" stroke-width="8" stroke-linecap="round"/>
    <path d="M145 42 H225 M145 72 H208 M145 102 H235" stroke="#c5b8ad" stroke-opacity="0.42" stroke-width="8" stroke-linecap="round"/>
    <text x="22" y="132" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#f39c12">DATABASE</text>
  </g>

  <g transform="translate(860 105)">
    <rect width="260" height="160" rx="18" fill="#17110f" fill-opacity="0.78" stroke="#f39c12" stroke-opacity="0.26"/>
    <rect x="26" y="34" width="208" height="86" rx="12" fill="#0c0908" stroke="#f39c12" stroke-opacity="0.2"/>
    <path d="M50 94 L94 62 L139 90 L181 50 L218 86" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="94" cy="62" r="7" fill="#f39c12"/>
    <circle cx="181" cy="50" r="7" fill="#e67e22"/>
    <text x="28" y="142" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#f39c12">CCTV FEED</text>
  </g>

  <g transform="translate(852 444)">
    <rect width="270" height="128" rx="18" fill="#17110f" fill-opacity="0.78" stroke="#f39c12" stroke-opacity="0.26"/>
    <path d="M78 34 C105 34 126 55 126 82 C126 116 78 116 78 116 C78 116 30 116 30 82 C30 55 51 34 78 34Z" fill="#281c15" stroke="url(#gold)" stroke-width="4"/>
    <circle cx="78" cy="78" r="15" fill="#f39c12"/>
    <path d="M152 42 H231 M152 72 H215 M152 102 H243" stroke="#c5b8ad" stroke-opacity="0.42" stroke-width="8" stroke-linecap="round"/>
    <text x="30" y="28" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#f39c12">LOCATION ALERT</text>
  </g>

  <g stroke="#f39c12" stroke-width="3" stroke-opacity="0.36" fill="none">
    <path d="M340 188 C384 206 390 236 425 250"/>
    <path d="M775 255 C820 227 819 197 860 185"/>
    <path d="M775 456 C820 481 817 509 852 514"/>
  </g>
  <g fill="#f39c12" opacity="0.75">
    <circle cx="340" cy="188" r="5"/>
    <circle cx="425" cy="250" r="5"/>
    <circle cx="775" cy="255" r="5"/>
    <circle cx="860" cy="185" r="5"/>
    <circle cx="775" cy="456" r="5"/>
    <circle cx="852" cy="514" r="5"/>
  </g>
</svg>
